name: CI - Test Comprehensive

on:
  pull_request:
    branches:
      - main

jobs:
  test-comprehensive:
    name: Test comprehensive
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crypto-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run all test cases
        run: npm test
